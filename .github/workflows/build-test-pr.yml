name: Build and test PR

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f #v6.0.1

      - name: Build and test
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test coverage verification
        run: ./gradlew jacocoTestCoverageVerification

      - name: Integration test
        run: ./gradlew integrationTest --tests '*IntegrationTest'

      - name: Publish package
        run: ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checkstyle report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: checkstyle-report
          path: claim-for-payment-service/build/reports/checkstyle
          retention-days: 14

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: test-report
          path: claim-for-payment-service/build/reports/tests
          retention-days: 14

      - name: Upload jacoco coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: jacoco-coverage-report
          path: claim-for-payment-service/build/reports/jacoco
          retention-days: 14

  vulnerability-scan-app:
    if: ${{ github.actor != 'dependabot[bot]' }} # Skip for Dependabot PRs
    runs-on: ubuntu-latest
    needs:
      - build-test
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_TEST_EXCLUDE: build,generated
      SNYK_TARGET_REFERENCE: main
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Run Snyk to check app for vulnerabilities
        uses: snyk/actions/gradle@9adf32b1121593767fc3c057af55b55db032dc04 #v1.0.0
        with:
          command: code test
          args: --severity-threshold=high

  vulnerability-scan-docker:
    if: ${{ github.actor != 'dependabot[bot]' }} # Skip for Dependabot PRs
    runs-on: ubuntu-latest
    needs:
      - build-test
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f #v6.0.1

      - name: Build app jar with gradle
        run: ./gradlew :claim-for-payment-service:build

      # - name: Build a Docker image
      #   run: docker build -t claim-for-payment:scan .

      - name: Build local docker image #workaround for snyk issue with docker build
        run: |
          pwd
          ls -al
          docker build --pull -t claim-for-payment-scan -f claim-for-payment-service/Dockerfile claim-for-payment-service
          docker save claim-for-payment-scan -o image.tar

      # - name: Run Snyk to check Docker image for vulnerabilities
      #   uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 #v1.0.0
      #   with:
      #     image: claim-for-payment:scan
      #     args: --file=Dockerfile --severity-threshold=high --debug

      - name: Run Snyk to on tarball to check docker image for vulnerabilities #workaround for snyk issue with docker build
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 #v1.0.0
        with:
          image: image.tar
          args: --file=claim-for-payment-service/Dockerfile --severity-threshold=high --docker --debug --policy-path=./.snyk