name: SCA
run-name: Security Scanning

on:
  schedule:
    - cron: "0 0 * * *"
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: write   # if the action uploads CodeQL results
      packages: read           # REQUIRED for GitHub Packages Maven repo

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ github.actor }}

    steps:
    #   - uses: actions/checkout@v6
    #   - name: Set up Java 25
    #     uses: actions/setup-java@v5
    #     with:
    #       distribution: 'corretto'
    #       java-version: 25
    #       cache: gradle
      - uses: ministryofjustice/devsecops-actions/sca@v1.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}