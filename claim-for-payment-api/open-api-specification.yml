{
  "openapi": "3.1.0",
  "info": {
    "title": "OpenAPI definition",
    "version": "v0"
  },
  "servers": [
    {
      "url": "http://localhost:8080",
      "description": "Generated server url"
    }
  ],
  "tags": [
    {
      "name": "Claims",
      "description": "Operations related to provider claims"
    }
  ],
  "paths": {
    "/api/v1/claims/{id}": {
      "put": {
        "tags": [
          "Claims"
        ],
        "summary": "Update a claim",
        "operationId": "updateClaim",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "ID of the claim to update",
            "required": true,
            "schema": {
              "type": "integer",
              "format": "int64"
            }
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ClaimRequestBody"
              }
            }
          },
          "required": true
        },
        "responses": {
          "204": {
            "description": "Claim updated successfully"
          },
          "404": {
            "description": "Claim not found"
          }
        }
      }
    },
    "/api/v1/claims": {
      "get": {
        "tags": [
          "Claims"
        ],
        "summary": "Get paged claims for the authenticated user",
        "operationId": "getClaims",
        "parameters": [
          {
            "name": "page",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 0
            }
          },
          {
            "name": "limit",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 20
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Paged list of claims linked to a provider user",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/Claim"
                  }
                }
              }
            }
          }
        }
      },
      "post": {
        "tags": [
          "Claims"
        ],
        "summary": "Create a new claim",
        "operationId": "createClaim",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ClaimRequestBody"
              }
            }
          },
          "required": true
        },
        "responses": {
          "201": {
            "description": "Claim created successfully"
          },
          "400": {
            "description": "Invalid request body"
          }
        }
      }
    },
    "/api/v1/claims/{claimId}": {
      "get": {
        "tags": [
          "Claims"
        ],
        "summary": "Get a claim by ID",
        "operationId": "getClaim",
        "parameters": [
          {
            "name": "claimId",
            "in": "path",
            "description": "ID of the claim to retrieve",
            "required": true,
            "schema": {
              "type": "integer",
              "format": "int64"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Claim found",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Claim"
                }
              }
            }
          },
          "404": {
            "description": "Claim not found"
          }
        }
      },
      "delete": {
        "tags": [
          "Claims"
        ],
        "summary": "Delete a claim",
        "operationId": "deleteClaim",
        "parameters": [
          {
            "name": "claimId",
            "in": "path",
            "description": "ID of the claim to delete",
            "required": true,
            "schema": {
              "type": "integer",
              "format": "int64"
            }
          }
        ],
        "responses": {
          "204": {
            "description": "Claim deleted successfully"
          },
          "404": {
            "description": "Claim not found"
          }
        }
      }
    }
  },
  "components": {
    "schemas": {
      "ClaimRequestBody": {
        "type": "object",
        "description": "Claim input data",
        "properties": {
          "ufn": {
            "type": "string",
            "description": "universal file number"
          },
          "client": {
            "type": "string",
            "description": "client name"
          },
          "category": {
            "type": "string",
            "description": "claim category"
          },
          "concluded": {
            "type": "string",
            "format": "date",
            "description": "claim concluded date"
          },
          "feeType": {
            "type": "string",
            "description": "fee type"
          },
          "claimed": {
            "type": "number",
            "description": "amount claimed"
          },
          "submissionId": {
            "type": "string",
            "format": "uuid",
            "description": "id of the submission this claim links to"
          }
        },
        "required": [
          "client",
          "ufn"
        ]
      },
      "Claim": {
        "type": "object",
        "properties": {
          "id": {
            "type": "integer",
            "format": "int64"
          },
          "ufn": {
            "type": "string",
            "description": "universal file number"
          },
          "providerUserId": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the provider user making the submission"
          },
          "client": {
            "type": "string",
            "description": "client name"
          },
          "category": {
            "type": "string",
            "description": "claim category"
          },
          "concluded": {
            "type": "string",
            "format": "date",
            "description": "claim concluded date"
          },
          "feeType": {
            "type": "string",
            "description": "fee type"
          },
          "claimed": {
            "type": "number",
            "description": "amount claimed"
          },
          "submissionId": {
            "type": "string",
            "format": "uuid",
            "description": "id of the submission this claim belongs to"
          }
        },
        "required": [
          "id",
          "submissionId"
        ]
      }
    }
  }
}