plugins {
    id 'io.freefair.lombok' version '9.2.0'
    id 'uk.gov.laa.springboot.laa-spring-boot-gradle-plugin'
    id 'org.openapi.generator' version '7.16.0'
    id "org.springdoc.openapi-gradle-plugin" version "1.9.0"
}


test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
    testLogging {
        // events "passed", "skipped", "failed", "standard_out", "standard_error"
        // showStandardStreams = true
    }
}

integrationTest {
    testLogging {
        // events "passed", "skipped", "failed", "standard_out", "standard_error"
        // showStandardStreams = true
    }
}

jacocoTestReport {
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                '**/ClaimForPaymentApplication.class',
                '**/uk/gov/justice/laa/claimforpayment/civilclaims/**'
            ])
        }))
    }
}

jacocoTestCoverageVerification {
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                '**/ClaimForPaymentApplication.class',
                '**/uk/gov/justice/laa/claimforpayment/civilclaims/**'
            ])
        }))
    }
}


def civilClaimsOutDir = file("$rootDir/claim-for-payment-service/generated")

tasks.register("cleanCivilClaimsApi", Delete) {
  delete(civilClaimsOutDir)
}

tasks.register('generateCivilClaimsApi', org.openapitools.generator.gradle.plugin.tasks.GenerateTask) {
  dependsOn(tasks.named("cleanCivilClaimsApi"))

  generatorName = "java"
  library = "resttemplate"
  inputSpec = "$rootDir/claim-for-payment-service/src/main/openapi/stub-civil-claims-api.json"
  outputDir = civilClaimsOutDir.toString()

  apiPackage = "uk.gov.justice.laa.claimforpayment.civilclaims.api"
  modelPackage = "uk.gov.justice.laa.claimforpayment.civilclaims.model"
  invokerPackage = "uk.gov.justice.laa.claimforpayment.civilclaims.invoker"
  generateModelTests = false
  generateApiTests = false

  additionalProperties = [
      dateLibrary        : "java8",
      useRuntimeException: "true",
      useBeanValidation  : "true",
      useJakartaEe       : "true",
      modelNamePrefix    : "Civil",
      apiNamePrefix      : "Civil",  
      generateSupportingFiles: "false"
  ]
  outputs.dir(outputDir)

}

// Enforce ordering if clean runs
tasks.named('generateCivilClaimsApi') {
    mustRunAfter tasks.named('clean')
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java', 'generated/src/main/java']
        }
    }
    // Add this to ensure integration tests find their resources
    integrationTest {
        java {
            srcDir 'src/integrationTest/java'
        }
        resources {
            srcDir 'src/integrationTest/resources' // This is where WireMock mappings live
        }
        compileClasspath += sourceSets.main.output + sourceSets.test.output
        runtimeClasspath += sourceSets.main.output + sourceSets.test.output
    }
}

tasks.named('processIntegrationTestResources') {
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

