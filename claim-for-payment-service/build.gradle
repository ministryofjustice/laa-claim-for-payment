tasks.named('checkstyleMain') {
  // Only lint your handwritten code:
  source = fileTree('src/main/java')
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-webmvc'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server' 
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.2'
    implementation 'org.apache.tomcat.embed:tomcat-embed-core:11.0.18' 
    implementation 'org.mapstruct:mapstruct:1.6.3'
    annotationProcessor 'org.mapstruct:mapstruct-processor:1.6.3'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation "org.springframework.security:spring-security-test"
    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
    testImplementation 'org.wiremock.integrations:wiremock-spring-boot:4.0.9'
    testImplementation 'com.atlassian.oai:swagger-request-validator-core:2.46.0'
    testImplementation('com.atlassian.oai:swagger-request-validator-wiremock:2.46.0') {
        exclude group: 'com.github.tomakehurst', module: 'wiremock-jre8'
    }
    testImplementation 'org.wiremock.integrations:wiremock-spring-boot:4.2.0'
    testImplementation 'org.wiremock:wiremock-standalone:3.13.2'

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    developmentOnly 'org.springframework.boot:spring-boot-devtools'
    implementation 'org.openapitools:jackson-databind-nullable:0.2.9'

    implementation("io.swagger.core.v3:swagger-core-jakarta:2.2.43") {
        exclude group: "org.apache.commons", module: "commons-lang3"
    }
    implementation "org.apache.commons:commons-lang3:3.19.0"

    // Force the entire Jackson ecosystem to 2.21.1
    implementation(platform("com.fasterxml.jackson:jackson-bom:2.21.1")) {
        version {
            strictly '2.21.1'
        }
    }

    constraints {
        // Force transitive Rhino to a safe version
        testImplementation('org.mozilla:rhino:1.7.15.1') {
            because 'fix high severity XXE vulnerability SNYK-JAVA-ORGMOZILLA-1314295'
        }
    }

}

tasks.withType(JavaCompile).configureEach {
    dependsOn(tasks.generateCivilClaimsApi)
}

// Ensure clean removes the generated code automatically
clean.dependsOn(tasks.cleanCivilClaimsApi)

